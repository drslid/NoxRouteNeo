name: Container images

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths:
      - .github/workflows/container-images.yml
      - .dockerignore
      - apps/**
      - packages/**
      - services/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - tsconfig.base.json
      - turbo.json
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: container-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: ${{ matrix.title }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - title: Web
            package: noxrouteneo-web
            dockerfile: apps/web/Dockerfile
            description: NoxRouteNeo administration and user web application
          - title: Runtime
            package: noxrouteneo-runtime
            dockerfile: services/runtime/Dockerfile
            description: NoxRouteNeo Xray runtime and control plane agent
          - title: Traffic Gateway
            package: noxrouteneo-traffic-gateway
            dockerfile: services/traffic-gateway/Dockerfile
            description: NoxRouteNeo traffic admission and bandwidth gateway
          - title: Security Agent
            package: noxrouteneo-security-agent
            dockerfile: services/security-agent/Dockerfile
            description: NoxRouteNeo host firewall security agent

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Sign in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.package }}
          tags: |
            type=raw,value=main,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.title=NoxRouteNeo ${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and publish multi-architecture image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          pull: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=${{ matrix.package }}
          cache-to: type=gha,mode=max,scope=${{ matrix.package }}

      - name: Inspect published manifest
        run: >-
          docker buildx imagetools inspect
          "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.package }}:${{ steps.meta.outputs.version }}"
